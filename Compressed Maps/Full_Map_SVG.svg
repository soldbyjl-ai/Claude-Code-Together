  <defs
     id="defs1">
    <filter
       id="selected-shadow"
       x="-30%"
       y="-30%"
       width="160%"
       height="160%">
      <!-- Outer glow: blur the alpha, flood blue, clip to blurred alpha -->
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="28"
         result="outer-blur"
         id="feGaussianBlur1" />
      <feFlood
         flood-color="#ef4444"
         flood-opacity="0.9"
         result="outer-color"
         id="feFlood1" />
      <feComposite
         in="outer-color"
         in2="outer-blur"
         operator="in"
         result="outer-glow"
         id="feComposite1" />
      <!-- Inner glow: flood red inside shape, blur inward, clip back to shape -->
      <feFlood
         flood-color="#fca5a5"
         flood-opacity="0.85"
         result="inner-flood"
         id="feFlood2" />
      <feComposite
         in="inner-flood"
         in2="SourceAlpha"
         operator="in"
         result="inner-clipped"
         id="feComposite2" />
      <feGaussianBlur
         in="inner-clipped"
         stdDeviation="55"
         result="inner-glow"
         id="feGaussianBlur2" />
      <!-- Stack: outer glow → source shape → inner glow on top -->
      <feMerge
         id="feMerge4">
        <feMergeNode
           in="outer-glow"
           id="feMergeNode2" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode3" />
        <feMergeNode
           in="inner-glow"
           id="feMergeNode4" />
      </feMerge>
    </filter>
    <style
       type="text/css"
       id="style4">
      .area-region { fill: transparent; stroke: #3b82f6; stroke-width: 12; cursor: pointer; transition: fill 0.2s ease; }
      .area-region:hover { fill: rgba(59,130,246,0.25); }
      .area-region.selected { fill: rgba(239,68,68,0.45); stroke: #b91c1c; stroke-width: 15; filter: url(#selected-shadow); }
    </style>
  </defs>
