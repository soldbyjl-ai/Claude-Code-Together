  <defs id="defs1">
    <filter id="selected-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <!-- Outer glow: blur the alpha, flood blue, clip to blurred alpha -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="28" result="outer-blur"/>
      <feFlood flood-color="#ef4444" flood-opacity="0.9" result="outer-color"/>
      <feComposite in="outer-color" in2="outer-blur" operator="in" result="outer-glow"/>
      <!-- Inner glow: flood red inside shape, blur inward, clip back to shape -->
      <feFlood flood-color="#fca5a5" flood-opacity="0.85" result="inner-flood"/>
      <feComposite in="inner-flood" in2="SourceAlpha" operator="in" result="inner-clipped"/>
      <feGaussianBlur in="inner-clipped" stdDeviation="55" result="inner-glow"/>
      <!-- Stack: outer glow → source shape → inner glow on top -->
      <feMerge>
        <feMergeNode in="outer-glow"/>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="inner-glow"/>
      </feMerge>
    </filter>
    <style type="text/css">
      .area-region { fill: transparent; stroke: #3b82f6; stroke-width: 12; cursor: pointer; transition: fill 0.2s ease; }
      .area-region:hover { fill: rgba(59,130,246,0.25); }
      .area-region.selected { fill: rgba(239,68,68,0.45); stroke: #b91c1c; stroke-width: 15; filter: url(#selected-shadow); }
    </style>
  </defs>
